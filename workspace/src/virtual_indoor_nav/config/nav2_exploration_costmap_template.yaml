# Recommended Nav2 costmap settings for frontier exploration.
#
# This file is a tuning template, not the default navigation file. Copy the
# relevant blocks into nav2_params.yaml when Nav2 is used to drive exploration
# goals directly. The current auto_explorer publishes /cmd_vel itself, but these
# values keep saved-map navigation permissive enough for narrow indoor passages.

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05

      # Use the measured robot radius plus a small safety margin. For this
      # robot, 0.22 m keeps 0.7-0.8 m doorways usable.
      robot_radius: 0.22

      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          max_obstacle_height: 2.0

          # raytrace_max_range should be greater than obstacle_max_range so
          # free-space clearing reaches beyond obstacle marking.
          raytrace_max_range: 12.0
          obstacle_max_range: 8.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer

        # Recommended range: 0.20-0.35 m for narrow indoor exploration.
        # Larger values make doorways look blocked.
        inflation_radius: 0.25
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      robot_radius: 0.22

      # Keep unknown space tracked so global planning can reason about frontier
      # boundaries instead of silently treating unknown cells as free space.
      track_unknown_space: true

      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          max_obstacle_height: 2.0
          raytrace_max_range: 12.0
          obstacle_max_range: 10.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer

        # Slightly larger than local inflation to prefer safer long paths while
        # still allowing normal indoor corridors.
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.5
      use_astar: false

      # Frontier exploration requires planning up to unknown boundaries.
      allow_unknown: true
