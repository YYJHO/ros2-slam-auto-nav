name: Feature request
description: Suggest an improvement or new navigation feature.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Mapping
        - Navigation
        - Control center
        - Robot model
        - Gazebo world
        - Documentation
        - Other
    validations:
      required: true
