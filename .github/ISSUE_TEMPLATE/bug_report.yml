name: Bug report
description: Report a reproducible problem with mapping, navigation, or setup.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact commands or control-center buttons used.
      placeholder: |
        1. bash scripts/check_system.sh
        2. bash scripts/build_workspace.sh
        3. bash scripts/run_auto_mapping.sh
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 22.04
    validations:
      required: true
  - type: input
    id: ros
    attributes:
      label: ROS 2 version
      placeholder: Humble
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only relevant logs. Do not include secrets or private paths if they matter.
      render: shell
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Attach or summarize output from scripts/check_system.sh when possible.
