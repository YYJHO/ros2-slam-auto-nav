name: Preflight

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run release preflight
        run: bash scripts/preflight_release.sh
